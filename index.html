<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Hacker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="matrix"></canvas>
  <div class="scanlines"></div>
  <div class="flash" id="flash"></div>

  <main class="container" id="container">
    <div class="tag">acesso restrito</div>

    <h1 class="title glitch" data-text="SISTEMA BLOQUEADO">
      <span id="typedText"></span>
      <span class="cursor">|</span>
    </h1>

    <p class="romantic">
  clique em tentar o acesso para entrar em meu coração parceira!
   </p>

    <p class="description">
      terminal protegido. tentativa não autorizada detectada.
    </p>

    <button id="accessBtn" class="btn">tentar acesso</button>

    <div class="panel hidden" id="panel">
      <div class="status-line">iniciando protocolo...</div>

      <div class="progress-box">
        <div class="progress-label">
          <span>verificação do sistema</span>
          <span id="progressValue">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <ul class="logs" id="logs">
        <li>[aguardando ação]</li>
      </ul>
    </div>

    <div class="popup" id="popup">⚠ tentativa registrada no sistema ⚠</div>
  </main>

  <script src="script.js"></script>
</body>
</html>
